homeassistant: false

mqtt:
  base_topic: zigbee2mqtt
  server: mqtt://mosquitto:1883

serial:
  port: /dev/ttyACM0
  adapter: ember

frontend:
  port: 8080

advanced:
  log_level: info
  log_output:
    - console
  channel: 15
  network_key: GENERATE
  pan_id: GENERATE

devices: {}

external_converters:
  - converters/sound_monitor.js
  - converters/rufilla-presence-node.js

permit_join: true
